server:
  port: 5002

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:oracle:thin:@localhost:1521/ORCL21PDB1
    username: airline_auth_db
    password: 123456
    driver-class-name: oracle.jdbc.OracleDriver
eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: "http://localhost:8070/eureka/"